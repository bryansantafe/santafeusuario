<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'core/img/favicon.png' %}">

    <meta property="og:title" content="Login | SANTA FE ENERGY">
    <title>Iniciar sesión | SANTA FE ENERGY</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Raleway', 'sans-serif'], }
                }
            }
        }
    </script>

    <style>
        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Degradado Light Mode */
        .animated-bg {
            background: linear-gradient(-45deg, #e2e8f0, #f8fafc, #d1fae5, #f1f5f9);
            background-size: 400% 400%;
            animation: gradient-bg 10s ease infinite;
        }

        /* Degradado Dark Mode */
        html.dark .animated-bg {
            background: linear-gradient(-45deg, #3791ae, #054d3c, #797777, #064e3b);
            background-size: 400% 400%;
            animation: gradient-bg 10s ease infinite;
        }

        .pattern-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("{% static 'core/img/favicon.png' %}");
            background-repeat: repeat; background-size: 80px; 
            opacity: 0.03; pointer-events: none; z-index: 0;
        }
        html.dark .pattern-overlay { opacity: 0.05; }
    </style>
</head>

<body class="animated-bg flex items-center justify-center min-h-screen relative overflow-hidden transition-colors duration-500">

    <div class="pattern-overlay"></div>

    <button id="theme-toggle" class="absolute top-4 right-4 z-20 bg-white/50 dark:bg-black/20 p-2 rounded-full backdrop-blur-md text-slate-600 dark:text-zinc-300 hover:scale-110 transition-transform">
        <svg id="theme-toggle-dark-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        <svg id="theme-toggle-light-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
    </button>

    <div class="relative z-10 w-full max-w-md bg-white/90 dark:bg-zinc-900/80 backdrop-blur-xl p-8 rounded-2xl shadow-2xl dark:shadow-[0_8px_30px_rgb(0,0,0,0.5)] border border-white/50 dark:border-zinc-700/50 ring-1 ring-emerald-500/10 dark:ring-emerald-500/20 transition-colors duration-300">

        <div class="text-center mb-8">
            <div class="flex flex-col items-center">
                <div class="flex w-14 h-14 bg-emerald-50 dark:bg-emerald-500/10 rounded-2xl items-center justify-center shadow-sm dark:shadow-[0_0_20px_rgba(16,185,129,0.15)] border border-emerald-100 dark:border-emerald-500/20 mb-2 transition-transform hover:scale-105">
                    <img src="{% static 'core/img/favicon.png' %}" alt="Isotipo Claro" class="w-8 h-8 object-contain">
                </div>

                <h1 class="text-slate-900 dark:text-white font-black text-xl tracking-tighter italic uppercase">
                    SANTA FE<span class="text-emerald-600 dark:text-emerald-500"> usuario</span>
                </h1>
            </div>
            <p class="text-slate-500 dark:text-zinc-400 text-sm mt-1 font-medium">Experiencia en el sector energético</p>
        </div>

        <form method="POST" id="loginForm" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-zinc-300 mb-2 tracking-wide">Usuario</label>
                <input type="text" name="username" required
                    class="block w-full px-4 py-3 bg-slate-50 dark:bg-zinc-950/50 border border-slate-200 dark:border-zinc-700/50 text-slate-900 dark:text-white rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all placeholder-slate-400 dark:placeholder-zinc-600 shadow-inner"
                    placeholder="Escribe tu usuario">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-zinc-300 mb-2 tracking-wide">Contraseña</label>
                <div class="relative">
                    <input type="password" name="password" id="passwordInput" required
                        class="block w-full px-4 py-3 pr-12 bg-slate-50 dark:bg-zinc-950/50 border border-slate-200 dark:border-zinc-700/50 text-slate-900 dark:text-white rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all placeholder-slate-400 dark:placeholder-zinc-600 shadow-inner"
                        placeholder="••••••••">
                    
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-emerald-600 dark:text-zinc-500 dark:hover:text-emerald-500 transition-colors focus:outline-none">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="btnSubmit"
                class="w-full bg-emerald-600 dark:bg-gradient-to-r dark:from-emerald-600 dark:to-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 dark:hover:from-emerald-500 dark:hover:to-emerald-400 active:scale-[0.98] transition-all shadow-lg dark:shadow-[0_0_20px_rgba(16,185,129,0.3)] flex items-center justify-center gap-2 mt-4">
                <span>Entrar al Dashboard</span>
            </button>
        </form>
    </div>

    <script>
        // Lógica de Toggle de Tema en Login
        var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        var themeToggleBtn = document.getElementById('theme-toggle');

        if (document.documentElement.classList.contains('dark')) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (localStorage.getItem('color-theme') === 'light') {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            }
        });
        
        // ... pega el resto de tus scripts del ojo y loading aquí ...
    </script>
</body>
</html>
