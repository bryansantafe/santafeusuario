{% extends 'core/base.html' %}

{% block title %}Nuevo Cliente | Santa Fe{% endblock %}
{% block page_title %}Registrar Nuevo Usuario{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-3xl p-8 shadow-sm dark:shadow-2xl transition-colors duration-300">
        
        <div class="mb-6 border-b border-slate-100 dark:border-zinc-800 pb-4">
            <h3 class="text-lg font-black text-slate-800 dark:text-white">Datos del Nuevo Usuario</h3>
            <p class="text-xs text-slate-500 dark:text-zinc-400 mt-1">Completa la información para generar sus credenciales de acceso.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %} 
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-slate-500 dark:text-zinc-400 uppercase tracking-widest mb-2 ml-1">Nombre o Razón Social</label>
                    <input type="text" name="nombre_usuario" required
                        class="w-full bg-slate-50 dark:bg-zinc-950/50 border border-slate-200 dark:border-zinc-800 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:border-emerald-500 dark:focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition shadow-inner">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 dark:text-zinc-400 uppercase tracking-widest mb-2 ml-1">Tipo de Identificación</label>
                    <select name="tipo_identificacion"
                        class="w-full bg-slate-50 dark:bg-zinc-950/50 border border-slate-200 dark:border-zinc-800 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:border-emerald-500 dark:focus:border-emerald-500 outline-none transition shadow-inner">
                        <option value="NIT">NIT</option>
                        <option value="CC">Cédula de Ciudadanía</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 dark:text-zinc-400 uppercase tracking-widest mb-2 ml-1">Número de Identificación</label>
                    <input type="text" name="numero_identificacion" required
                        class="w-full bg-slate-50 dark:bg-zinc-950/50 border border-slate-200 dark:border-zinc-800 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:border-emerald-500 dark:focus:border-emerald-500 outline-none transition shadow-inner font-mono">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 dark:text-zinc-400 uppercase tracking-widest mb-2 ml-1">Teléfono</label>
                    <input type="text" name="telefono" required
                        class="w-full bg-slate-50 dark:bg-zinc-950/50 border border-slate-200 dark:border-zinc-800 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:border-emerald-500 dark:focus:border-emerald-500 outline-none transition shadow-inner">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 dark:text-zinc-400 uppercase tracking-widest mb-2 ml-1">Correo Electrónico</label>
                    <input type="email" name="correo_electronico" required
                        class="w-full bg-slate-50 dark:bg-zinc-950/50 border border-slate-200 dark:border-zinc-800 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:border-emerald-500 dark:focus:border-emerald-500 outline-none transition shadow-inner">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 dark:text-zinc-400 uppercase tracking-widest mb-2 ml-1">Dirección de Facturación</label>
                <textarea name="direccion_facturacion" rows="3" required
                    class="w-full bg-slate-50 dark:bg-zinc-950/50 border border-slate-200 dark:border-zinc-800 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:border-emerald-500 dark:focus:border-emerald-500 outline-none transition shadow-inner"></textarea>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 pt-4 border-t border-slate-100 dark:border-zinc-800">
                <button type="submit"
                    class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-emerald-600/20 uppercase text-xs tracking-widest">
                    Guardar Cliente
                </button>
                <a href="{% url 'lista_clientes' %}"
                    class="flex-1 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 text-slate-700 dark:text-white text-center font-bold py-3 rounded-xl transition uppercase text-xs tracking-widest flex items-center justify-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
